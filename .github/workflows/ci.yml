name: CI - Validación del Proyecto

on:
  push:
    branches:
      - main
      - feature-ci
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el código del repositorio
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Ejecutar script de validación
        run: python automation/validate_project.py